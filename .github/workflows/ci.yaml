name: Build & Test

on:
  pull_request:

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version-file: .nvmrc
          cache: "npm"
          registry-url: "https://registry.npmjs.org"
      - name: Install
        run: npm install
      - name: Verify Integrity
        run: npm audit signatures --omit=dev
      - name: Lint
        run:
          npx nx affected:lint --parallel=3 --base=${{ github.event.pull_request.base.sha }} --head=${{
          github.event.pull_request.head.sha }}
      - name: Typecheck
        run:
          npx nx affected -t typecheck --parallel=3 --base=${{ github.event.pull_request.base.sha }} --head=${{
          github.event.pull_request.head.sha }}
      - name: Test
        run:
          npx nx affected:test --parallel=3 --base=${{ github.event.pull_request.base.sha }} --head=${{
          github.event.pull_request.head.sha }}
      - name: Build
        run:
          npx nx affected:build --parallel=1 --base=${{ github.event.pull_request.base.sha }} --head=${{
          github.event.pull_request.head.sha  }}
